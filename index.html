<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>松鼠小囤 AI Agent</title>
    <style>
        /* 让聊天窗口充满 Vercel 屏幕，扫码全屏查看 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f6f6f6;
        }
        #coze-chat-container {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>

    <div id="coze-chat-container"></div>

    <script src="https://sf-cdn.coze.com/obj/unpkg/flow-platform/chat-app-sdk/1.1.0-beta.0/index.js"></script>
    <script>
        new CozeWebSDK.WebChatClient({
            config: {
                bot_id: '7639999685670830132', // 你的 project_id 也就是你的 Bot ID
            },
            componentProps: {
                title: '松鼠小囤',
            },
            el: document.getElementById('coze-chat-container'),
            ui: {
                asMobile: true // 强制手机端全屏自适应
            }
        });
    </script>
</body>
</html>
